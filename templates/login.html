{% extends "layout.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white dark:bg-darkCard rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-800 overflow-hidden relative group">
    <div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent pointer-events-none group-hover:opacity-70 opacity-30 transition-opacity"></div>
    
    <div class="px-8 py-10 relative z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center p-4 bg-primary/10 rounded-2xl mb-4 group-hover:scale-105 transition-transform duration-300">
                <i class="ph-fill ph-lock-key text-5xl text-primary"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-900 dark:text-white mb-2">Admin Portal</h1>
            <p class="text-gray-500 font-medium tracking-wide">Secure Access Needed</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph-fill ph-user text-gray-400"></i>
                    </div>
                    <input type="text" name="username" required 
                           class="block w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl transition duration-200 text-gray-900 dark:text-white placeholder-gray-400 outline-none font-medium" 
                           placeholder="Enter admin username">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph-fill ph-key text-gray-400"></i>
                    </div>
                    <input type="password" name="password" required 
                           class="block w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl transition duration-200 text-gray-900 dark:text-white placeholder-gray-400 outline-none font-medium text-lg tracking-widest" 
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-primary to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white rounded-xl font-bold shadow-[0_4px_15px_rgba(59,130,246,0.3)] hover:shadow-[0_6px_20px_rgba(59,130,246,0.4)] transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                Authenticate <i class="ph-bold ph-arrow-right"></i>
            </button>
            <div class="text-center mt-6">
                <p class="text-xs text-gray-500 font-medium"><i class="ph-fill ph-shield-check text-green-500 mr-1"></i> 256-bit AES protection active</p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
